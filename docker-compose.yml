services:
  claude-proxy-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-proxy-web
    ports:
      - "5056:5056"
      - "5055:5055"
    environment:
      WEB_PORT: "5056"
      PROXY_PORT: "5055"
      AUTO_START_PROXY: "true"
      DATA_DIR: "/app/data"
      REWRITE_LOCALHOST_FOR_DOCKER: "true"
      DOCKER_HOST_ALIAS: "host.docker.internal"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
